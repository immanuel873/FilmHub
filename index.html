  <div class="container">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <div class="logo">
        <h2>&#127916; FILMHUB</h2>
      </div>
      <div class="auth-buttons">
        <button id="nav-login" class="btn-login">Login</button>
        <button id="nav-register" class="btn-register">Register</button>
      </div>
      <div class="user-section" id="user-section">
        <div id="user-info"></div>
        <a href="#" id="nav-upload" class="menu-item" onclick="showUpload()"><span class="icon">&#128228;</span> Upload</a>
        <a href="#" id="nav-my-videos" class="menu-item" onclick="showMyVideos()"><span class="icon">&#127909;</span> My Videos</a>
        <a href="#" id="nav-subscribe" class="menu-item" onclick="showSubscribe()"><span class="icon">&#128179;</span> Subscribe</a>
        <a href="#" id="nav-invite" class="menu-item" onclick="showInvite()"><span class="icon">&#128279;</span> Invite Friends</a>
        <a href="#" id="nav-points" class="menu-item" onclick="showPoints()"><span class="icon">&#128176;</span> Points</a>
        <a href="#" id="nav-admin" class="menu-item" onclick="showAdmin()"><span class="icon">&#9881;</span> Admin</a>
        <button id="nav-logout" class="btn-logout" onclick="clearToken(); updateNav(); showHome()">Logout</button>
      </div>
    </nav>

    <div class="content-area">
      <header class="top-bar">
        <div class="top-group">
          <button id="nav-home" class="top-link active" type="button">Home</button>

        </div>
        <div class="top-group">
          <span class="top-label">Categories</span>
          <button id="nav-drama" class="top-link" type="button">Drama</button>
          <button id="nav-educative" class="top-link" type="button">Educative</button>
          <button id="nav-comedies" class="top-link" type="button">Comedies</button>
          <button id="nav-dancing" class="top-link" type="button">Dancing Videos</button>
          <button id="nav-music" class="top-link" type="button">Music Videos</button>
        </div>
      </header>
      <!-- Main Content -->
      <main id="main-content" class="main-content">
        <!-- content injected by JS -->
      </main>
    </div>
